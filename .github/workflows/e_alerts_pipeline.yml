name: Run E-Alerts Pipeline

on:
  repository_dispatch:
    types: [cron-trigger]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      # Add your API credentials as repository secrets and map them here.
      # Example:
      # MY_API_KEY: ${{ secrets.MY_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lxml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch parliament data
        run: python fetch_parliament_data.py

      - name: Generate HTML
        run: python generate_html.py

      - name: Send updates
        run: python send_updates.py

      - name: Commit and push any changed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ mappings.csv parliament_data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: automated pipeline update [skip ci]"
            git push
          fi
