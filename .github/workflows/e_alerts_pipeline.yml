name: Run E-Alerts Pipeline

on:
  repository_dispatch:
    types: [cron-trigger]
  
  workflow_dispatch:  # Allows manual trigger from GitHub UI


jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      API_KEY: ${{ secrets.API_KEY }}
      AUDIENCE_ID: ${{ secrets.AUDIENCE_ID }}
      DATA_CENTRE: ${{ secrets.DATA_CENTRE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lxml
          pip install requests

      - name: Fetch parliament data
        run: python fetch_parliament_data.py

      - name: Generate HTML
        run: python generate_html.py

      - name: Send updates
        run: python send_updates.py

      - name: Commit and push any changed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ mappings.csv parliament_data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: automated pipeline update [skip ci]"
            git push
          fi
